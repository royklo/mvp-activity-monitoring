# MVP activity monitor config. Full details in README.md.

# Sources can declare their own keywords/exclude_keywords (recommended)
# or use the global fallback further down when omitted.
sources:
  - url: https://your-blog.example.com/feed.xml
    keywords: []
      # e.g.
      # - "<your name>"
      # - "<your-github-login>"
      # - "@<your-handle>"
    exclude_keywords: []
      # e.g.
      # - "sponsored"
      # - "<your-employer>"

# GLOBAL fallback filters.
# Only apply to sources listed above as a BARE URL STRING (shorthand form,
# no `url:` key, no per-source keywords/exclude_keywords). Sources defined
# with the dict form ignore these completely and use their own lists.
# Leave both empty if every source above already declares its own filters.
keywords:
exclude_keywords:

# start_date: 2026-01-01
auto_merge: false
model: openai/gpt-4.1  # gpt-5 rejects temperature=0 without a code patch

# Optional wheremymvps.at conference sync. Needs repo secret
# WHEREMYMVPSAT_PAT with the speakers:read scope.
wheremymvpsat:
  enabled: false
  # user_id: your-github-login
