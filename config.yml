# MVP activity monitor - edit this file to point the workflow at your content.
# See README.md for the full field reference.

# One entry per feed URL or page URL. Feeds are auto-detected; anything
# that isn't a feed is fetched as a plain HTML page.
sources:
  - https://rksolutions.nl/feed.xml
  # - https://anchor.fm/your-podcast/rss
  # - https://youtube.com/feeds/videos.xml?channel_id=XXXXXXXX
  # - https://someevent.example.com/your-session

# Keywords the workflow filters on. For sources you author yourself
# (your own blog feed, your own YouTube feed), leave this empty to
# capture everything you publish.
#
# For sources you do NOT own (a community aggregator, an event site,
# a co-host's podcast feed), put your own name and any handles that
# uniquely identify your content, so only items about you or by you
# become activity entries.
keywords:
 # - Roy Klooster

# When true, the nightly PR is auto-merged as soon as it's mergeable.
# When false (default), you review every draft before it lands on main.
auto_merge: false

# Model used via GitHub Models. gpt-4o is a solid default; swap for any
# model exposed at https://models.github.ai/inference.
model: openai/gpt-4o
