# MVP activity monitor config. See README.md for details.

# keywords / exclude_keywords are semantic topic hints (not substrings).
sources:
  - url: https://your-blog.example.com/feed.xml
    keywords:
    exclude_keywords:
      # - sponsored content
      # - product marketing for <your employer>
  - url: https://third-party-website.example.com/feed.xml
    keywords:
      # - "<your name>"       # replace placeholder with your real name before uncommenting
    exclude_keywords:
      # - sponsored content
      # - product marketing for <your employer>

# Global fallbacks - used only for bare-URL sources above.
keywords:
exclude_keywords:
  # - "<your employer>"      # replace placeholder with your real employer before uncommenting
  - sponsored content

# start_date: 2026-01-01
auto_merge: false
model: openai/gpt-4.1

wheremymvpsat:
  enabled: false
  # user_id must match the handle EXACTLY as stored on wheremymvps.at -
  # case-sensitive, no leading '@'. E.g. profile shown as "@Jane-Doe"
  # is stored as "Jane-Doe"; "jane-doe" will return zero rows.
  # user_id: "Your-GitHub-Login"
