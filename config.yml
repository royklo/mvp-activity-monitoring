# MVP activity monitor config. See README.md for details.

# Feeds are auto-detected; non-feed URLs are fetched as HTML pages.
sources:
  - https://rksolutions.nl/feed.xml
  # - https://anchor.fm/your-podcast/rss
  # - https://youtube.com/feeds/videos.xml?channel_id=XXXXXXXX

# Include filter. Leave empty for sources you own.
keywords:
 # - Roy Klooster

# Exclude filter. Case-insensitive substring on title/summary/URL.
exclude_keywords:
 - inforcer

# Only items published on or after this date (YYYY-MM-DD).
start_date: 2026-06-25

auto_merge: false
model: openai/gpt-4o
