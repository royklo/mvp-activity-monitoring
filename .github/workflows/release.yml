name: Release

# Auto-tags and publishes a GitHub release on every merge to main.
# Guarded to the template repo only - downstream forks/templated
# instances inherit this file but the job no-ops there, so their
# daily monitor-PR merges don't spam release notifications. If you
# maintain your own fork and want your own release cadence, change
# the repository string below to `<your-owner>/<your-repo>`.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.repository == 'royklo/mvp-activity-monitoring'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
