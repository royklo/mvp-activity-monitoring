name: MVP activity monitor

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        id: monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WHEREMYMVPSAT_PAT: ${{ secrets.WHEREMYMVPSAT_PAT }}
        run: python scripts/monitor.py

      - name: Compute branch name
        id: branch
        if: steps.monitor.outputs.has_new == 'true'
        run: |
          ts=$(date -u +%Y-%m-%d-%H%M%S)
          echo "name=mvp-monitor/${ts}-${{ steps.monitor.outputs.types }}" >> "$GITHUB_OUTPUT"

      - name: Read auto_merge flag
        id: cfg
        if: steps.monitor.outputs.has_new == 'true'
        run: |
          echo "auto_merge=$(python -c "import yaml; print(str(yaml.safe_load(open('config.yml')).get('auto_merge', False)).lower())")" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        id: pr
        if: steps.monitor.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: MVP activities (${{ steps.monitor.outputs.types }})"
          title: "MVP activities: ${{ steps.monitor.outputs.types }}"
          body: |
            Automated MVP activity capture from the monitor.

            Types detected in this run: `${{ steps.monitor.outputs.types }}`.

            Review each generated file in `activities/`, fill in any
            "(fill from analytics before submitting)" placeholders, tweak
            wording if needed, and merge.
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cfg.outputs.auto_merge == 'true' && steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
